services:
  - type: web
    name: quotebot
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python -m spacy download en_core_web_md
      rasa train
    startCommand: |
      chmod +x start_actions.sh
      ./start_actions.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.18
      - key: RASA_TELEMETRY_ENABLED
        value: "false"
